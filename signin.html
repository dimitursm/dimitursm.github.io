<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Sign-in page</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
    <script src='main.js'></script>
</head>
<body>
    <div class="topnav">
        <a href="index.html">Main page</a>
        <a href="login.html">Log-in page</a>
    </div>
    <br><br>
    <div class="lsform">
        <form action="/action_page.php" method="get">
            <label for="uname">Username:</label>
            <input type="text" id="uname" name="uname"><br><br>
            
            <label for="pword">Password:</label>
            <input type="password" id="pword" name="pword"><br><br>

            <label for="flname">Full name:</label>
            <input type="text" id="flname" name="flname"><br><br>
            
            <label for="address">Address:</label>
            <input type="text" id="address" name="address"><br><br>
            
            <label for="country">Country:</label>
            <select name="country">
                <option value="uk">United Kingdom</option>
                <option value="nl">Netherlands</option>
            </select>
            <br><br>
            
            <label for="zip">ZIP code:</label>
            <input type="text" id="zip" name="zip"><br><br>
            
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email"><br><br>

            <label for="sex">Sex:</label>
            <select name="sex">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="pnts">Prefer not to say</option>
            </select>
            <br><br>

            <label for="lang">Language:</label>
            <select name="lang">
                <option value="eng">English</option>
                <option value="nl">Dutch</option>
            </select>
            <br><br>

            <label for="bio">About me:</label><br><br>
            <textarea rows="10" cols="30" name="bio"></textarea><br><br>

            <div class="radio-buttons">
                <label for="driver">Driver</label>
                <input type="radio" id="driver" name="radio">
                
                <label for="passenger">Passenger</label>
                <input type="radio" id="passenger" name="radio">
            </div>

            <div class="btn">
                <input type="submit" value="Sign in">
            </div>
            
        </form>
    </div>
</body>
</html>
